name: Daily Paper Update

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch papers
        env:
          ARXIV_COOLDOWN_MS: "15000"
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
        run: npm run fetch

      - name: Summarize papers
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run summarize

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: daily paper data update"
          git push
